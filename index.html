<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOS Battle Predictor</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="frost-bg"></div>

<div class="app">

  <!-- ── Header ────────────────────────────── -->
  <header class="app-header">
    <div class="hdr-brand">
      <div class="status-dot" id="status-dot"></div>
      <h1>WOS BATTLE PREDICTOR</h1>
    </div>
    <div class="accuracy-badge">
      MODEL ACCURACY: <span id="accuracy-value">LOADING…</span>
    </div>
  </header>

  <!-- ── Battle grid ───────────────────────── -->
  <div class="battle-grid">

    <!-- ── ATTACKER ──────────────────────── -->
    <section class="panel atk-panel">
      <div class="panel-hdr">
        <h2>⚔ ATTACKING FORCE</h2>
        <span class="role-tag atk">ATTACKER</span>
      </div>

      <div class="stat-group">
        <div class="group-label">Identity</div>
        <div class="field full">
          <label>Player / Alliance Tag</label>
          <input type="text" id="atk-name" class="wos-input" placeholder="e.g. [SLD] Ahmed">
        </div>
      </div>

      <div class="stat-group">
        <div class="group-label">Base Combat Stats</div>
        <div class="stat-cols">
          <div class="field">
            <label>Attack</label>
            <input type="number" id="atk-attack" class="wos-input" value="50000">
          </div>
          <div class="field">
            <label>Defense</label>
            <input type="number" id="atk-defense" class="wos-input" value="40000">
          </div>
          <div class="field">
            <label>Health</label>
            <input type="number" id="atk-health" class="wos-input" value="80000">
          </div>
          <div class="field">
            <label>Lethality</label>
            <input type="number" id="atk-lethality" class="wos-input" value="30000">
          </div>
          <div class="field full">
            <label>HP (Troop Count)</label>
            <input type="number" id="atk-hp" class="wos-input" value="1000">
          </div>
        </div>
      </div>

      <div class="stat-group">
        <div class="group-label">Research &amp; Gear Bonus %</div>
        <div class="stat-cols">
          <div class="field">
            <label>Atk Bonus %</label>
            <input type="number" id="atk-attack-pct" class="wos-input pct" value="50">
          </div>
          <div class="field">
            <label>Def Bonus %</label>
            <input type="number" id="atk-defense-pct" class="wos-input pct" value="30">
          </div>
          <div class="field">
            <label>HP Bonus %</label>
            <input type="number" id="atk-health-pct" class="wos-input pct" value="40">
          </div>
          <div class="field">
            <label>Leth Bonus %</label>
            <input type="number" id="atk-lethality-pct" class="wos-input pct" value="20">
          </div>
        </div>
      </div>
    </section>

    <!-- ── CENTER ────────────────────────── -->
    <section class="battle-center">
      <div class="vs-ring"><span>VS</span></div>

      <div class="action-btns">
        <button class="wos-btn btn-v2" id="predict-btn">
          <span class="b-main">PREDICT</span>
          <span class="b-sub">V2 · AI MODEL</span>
        </button>
        <button class="wos-btn btn-v1" id="simulate-btn">
          <span class="b-main">SIMULATE</span>
          <span class="b-sub">V1 · FORMULA</span>
        </button>
      </div>

      <!-- Results -->
      <div id="results-panel" class="hidden">
        <div class="res-title" id="result-title">CALCULATING…</div>

        <div id="prob-wrap">
          <svg viewBox="0 0 108 108">
            <circle class="ring-bg"   cx="54" cy="54" r="48" stroke-width="8" fill="none"/>
            <circle class="ring-fill" cx="54" cy="54" r="48" stroke-width="8" fill="none" id="prob-ring"/>
          </svg>
          <div class="prob-label">
            <span id="prob-text">0%</span>
            <span class="prob-sub">WIN PROB</span>
          </div>
        </div>

        <div class="result-details" id="result-details"></div>
        <div id="battle-log"></div>
      </div>
    </section>

    <!-- ── DEFENDER ──────────────────────── -->
    <section class="panel def-panel">
      <div class="panel-hdr">
        <h2>🛡 DEFENDING FORCE</h2>
        <span class="role-tag def">DEFENDER</span>
      </div>

      <div class="stat-group">
        <div class="group-label">Identity</div>
        <div class="field full">
          <label>Player / Alliance Tag</label>
          <input type="text" id="def-name" class="wos-input" placeholder="e.g. [ELT] Rival">
        </div>
      </div>

      <div class="stat-group">
        <div class="group-label">Base Combat Stats</div>
        <div class="stat-cols">
          <div class="field">
            <label>Attack</label>
            <input type="number" id="def-attack" class="wos-input" value="45000">
          </div>
          <div class="field">
            <label>Defense</label>
            <input type="number" id="def-defense" class="wos-input" value="42000">
          </div>
          <div class="field">
            <label>Health</label>
            <input type="number" id="def-health" class="wos-input" value="75000">
          </div>
          <div class="field">
            <label>Lethality</label>
            <input type="number" id="def-lethality" class="wos-input" value="28000">
          </div>
          <div class="field full">
            <label>HP (Troop Count)</label>
            <input type="number" id="def-hp" class="wos-input" value="1000">
          </div>
        </div>
      </div>

      <div class="stat-group">
        <div class="group-label">Research &amp; Gear Bonus %</div>
        <div class="stat-cols">
          <div class="field">
            <label>Atk Bonus %</label>
            <input type="number" id="def-attack-pct" class="wos-input pct" value="45">
          </div>
          <div class="field">
            <label>Def Bonus %</label>
            <input type="number" id="def-defense-pct" class="wos-input pct" value="35">
          </div>
          <div class="field">
            <label>HP Bonus %</label>
            <input type="number" id="def-health-pct" class="wos-input pct" value="38">
          </div>
          <div class="field">
            <label>Leth Bonus %</label>
            <input type="number" id="def-lethality-pct" class="wos-input pct" value="18">
          </div>
        </div>
      </div>
    </section>

  </div><!-- /battle-grid -->

</div><!-- /app -->

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
