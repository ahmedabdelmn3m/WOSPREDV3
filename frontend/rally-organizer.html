<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WOS Rally Organizer</title>
  <style>
    :root {
      --bg: #07090f;
      --surface: #0d1421;
      --card: #111c2e;
      --input-bg: #0a1220;
      --border: #1e3a5f;
      --border-hi: #2a4a6f;
      --ice: #00c8ff;
      --win: #2ecc71;
      --loss: #e74c3c;
      --warn: #f39c12;
      --txt: #d4e8f0;
      --txt-dim: #7a99b8;
      --txt-hi: #ffffff;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      background: var(--bg);
      color: var(--txt);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
    }
    .app-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      background: linear-gradient(90deg, #060c18, #0d1a30);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      margin-bottom: 14px;
    }
    .logo-title { font-size: 17px; font-weight: 800; color: var(--ice); letter-spacing: 2px; }
    .logo-sub { display: block; font-size: 11px; color: var(--txt-dim); letter-spacing: 1px; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 8px; }
    .nav-links a, button {
      min-height: 36px;
      padding: 8px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border-hi);
      background: rgba(0,200,255,.12);
      color: var(--ice);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    button.secondary { background: transparent; color: var(--txt); border-color: var(--border); }
    input, select {
      width: 100%;
      min-height: 36px;
      padding: 8px 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--txt-hi);
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--txt-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .section-title {
      color: var(--txt-dim);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .field-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .hero-grid { display: grid; gap: 8px; margin-top: 10px; }
    .hero-row, .joiner-card {
      display: grid;
      grid-template-columns: 1fr 90px 110px;
      gap: 8px;
      padding: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .joiner-card { grid-template-columns: 1fr 130px 130px 90px 110px; margin-bottom: 8px; }
    .output-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
    .metric {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .metric span { display: block; color: var(--txt-dim); font-size: 11px; text-transform: uppercase; }
    .metric strong { display: block; margin-top: 4px; color: var(--txt-hi); font-size: 20px; }
    .list { display: grid; gap: 8px; margin-top: 10px; }
    .list-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .warn { color: var(--warn); }
    .good { color: var(--win); }
    .bad { color: var(--loss); }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      display: none;
      padding: 10px 20px;
      border-radius: 20px;
      background: var(--win);
      color: #07100b;
      font-weight: 800;
    }
    @media (max-width: 980px) {
      .grid, .field-grid, .hero-row, .joiner-card, .output-grid { grid-template-columns: 1fr; }
      .app-header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div>
      <div class="logo-title">WOS RALLY ORGANIZER</div>
      <span class="logo-sub">Leader heroes, joiner captains, formation mix, copyable rally plan</span>
    </div>
    <nav class="nav-links">
      <a href="index.html">Battle Predictor</a>
      <a href="rally.html">Rally Timing</a>
    </nav>
  </header>

  <main>
    <div class="grid">
      <section class="card">
        <div class="section-title">Leader Main March</div>
        <div class="field-grid">
          <label>Leader Name<input id="leader-name" value="Rally Leader" /></label>
          <label>Total Troops<input id="leader-troops" type="number" min="1" value="800000" /></label>
          <label>Rally Type
            <select id="rally-type">
              <option value="attack">Attack</option>
              <option value="defense">Defense</option>
              <option value="bear">Bear / Beast</option>
            </select>
          </label>
        </div>
        <div class="field-grid" style="margin-top:10px">
          <label>Infantry %<input id="leader-form-infantry" type="number" min="0" max="100" value="50" /></label>
          <label>Lancer %<input id="leader-form-lancer" type="number" min="0" max="100" value="20" /></label>
          <label>Marksman %<input id="leader-form-marksman" type="number" min="0" max="100" value="30" /></label>
        </div>
        <div id="leader-heroes" class="hero-grid"></div>
      </section>

      <section class="card">
        <div class="section-title">Joiners - Captain Hero Only</div>
        <div id="joiners"></div>
      </section>
    </div>

    <section class="card">
      <div class="section-title">Rally Output</div>
      <div id="validation" class="list"></div>
      <div id="output"></div>
      <div class="actions">
        <button id="copy-plan">Copy Rally Setup</button>
        <button id="clear-plan" class="secondary">Clear</button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
  'use strict';

  const troops = ['infantry', 'lancer', 'marksman'];
  const heroes = [
    { id: 'natalia', name: 'Natalia', type: 'infantry', generation: 1, expedition: { attack_pct: 200.16, defense_pct: 200.16 }, skills: [] },
    { id: 'jeronimo', name: 'Jeronimo', type: 'infantry', generation: 1, expedition: { attack_pct: 260.2, defense_pct: 260.2 }, skills: [] },
    { id: 'molly', name: 'Molly', type: 'lancer', generation: 1, expedition: { attack_pct: 200.16, defense_pct: 200.16 }, skills: [] },
    { id: 'zinman', name: 'Zinman', type: 'marksman', generation: 1, expedition: { attack_pct: 200.16, defense_pct: 200.16 }, skills: [] },
    { id: 'flint', name: 'Flint', type: 'infantry', generation: 2, expedition: { attack_pct: 240.19, defense_pct: 240.19 }, skills: [] },
    { id: 'philly', name: 'Philly', type: 'lancer', generation: 2, expedition: { attack_pct: 240.19, defense_pct: 240.19 }, skills: [] },
    { id: 'alonso', name: 'Alonso', type: 'marksman', generation: 2, expedition: { attack_pct: 240.19, defense_pct: 240.19 }, skills: [] },
    { id: 'logan', name: 'Logan', type: 'infantry', generation: 3, expedition: { attack_pct: 290.23, defense_pct: 290.23 }, skills: [] },
    { id: 'mia', name: 'Mia', type: 'lancer', generation: 3, expedition: { attack_pct: 290.23, defense_pct: 290.23 }, skills: [] },
    { id: 'greg', name: 'Greg', type: 'marksman', generation: 3, expedition: { attack_pct: 290.23, defense_pct: 290.23 }, skills: [] },
    { id: 'ahmose', name: 'Ahmose', type: 'infantry', generation: 4, expedition: { attack_pct: 370.29, defense_pct: 370.29 }, skills: [] },
    { id: 'reina', name: 'Reina', type: 'lancer', generation: 4, expedition: { attack_pct: 370.29, defense_pct: 370.29 }, skills: [] },
    { id: 'lynn', name: 'Lynn', type: 'marksman', generation: 4, expedition: { attack_pct: 370.29, defense_pct: 370.29 }, skills: [] },
    { id: 'hector', name: 'Hector', type: 'infantry', generation: 5, expedition: { attack_pct: 444.35, defense_pct: 444.35 }, skills: [] },
    { id: 'norah', name: 'Norah', type: 'lancer', generation: 5, expedition: { attack_pct: 444.35, defense_pct: 444.35 }, skills: [] },
    { id: 'gwen', name: 'Gwen', type: 'marksman', generation: 5, expedition: { attack_pct: 444.35, defense_pct: 444.35 }, skills: [] },
  ];
  let lastPlan = '';

  const $ = (id) => document.getElementById(id);
  const num = (id) => Number($(id).value || 0);
  const fmt = (value) => Math.round(Number(value || 0)).toLocaleString();
  const label = (value) => value.charAt(0).toUpperCase() + value.slice(1);

  function options(type, placeholder) {
    return [`<option value="">${placeholder}</option>`]
      .concat(heroes.filter((h) => !type || h.type === type).map((h) => `<option value="${h.id}">${h.name} - ${label(h.type)} Gen ${h.generation}</option>`))
      .join('');
  }

  function buildLeaderHeroes() {
    $('leader-heroes').innerHTML = troops.map((type) => `
      <div class="hero-row">
        <label>${label(type)} Hero<select id="leader-hero-${type}">${options(type, `Select ${label(type)}`)}</select></label>
        <label>Stars<input id="leader-stars-${type}" type="number" min="1" max="5" value="5" /></label>
        <label>Widget<input id="leader-widget-${type}" type="number" min="1" max="10" value="1" /></label>
      </div>`).join('');
  }

  function buildJoiners() {
    $('joiners').innerHTML = Array.from({ length: 4 }, (_, i) => {
      const n = i + 1;
      return `
        <div class="joiner-card">
          <label>Joiner ${n}<input id="joiner-${n}-name" value="Joiner ${n}" /></label>
          <label>Troops<input id="joiner-${n}-troops" type="number" min="1" value="250000" /></label>
          <label>Captain Hero<select id="joiner-${n}-hero">${options('', 'Select captain')}</select></label>
          <label>Stars<input id="joiner-${n}-stars" type="number" min="1" max="5" value="5" /></label>
          <label>Widget<input id="joiner-${n}-widget" type="number" min="1" max="10" value="1" /></label>
        </div>`;
    }).join('');
  }

  function readHero(id) {
    return heroes.find((hero) => hero.id === id);
  }

  function readLeaderHeroes() {
    return troops.map((type) => {
      const hero = readHero($(`leader-hero-${type}`).value);
      return hero ? { ...hero, stars: num(`leader-stars-${type}`), widget: num(`leader-widget-${type}`) } : null;
    }).filter(Boolean);
  }

  function readJoiners() {
    return Array.from({ length: 4 }, (_, i) => {
      const n = i + 1;
      const hero = readHero($(`joiner-${n}-hero`).value);
      return {
        name: $(`joiner-${n}-name`).value.trim() || `Joiner ${n}`,
        troops: num(`joiner-${n}-troops`),
        captain: hero ? { ...hero, stars: num(`joiner-${n}-stars`), widget: num(`joiner-${n}-widget`) } : null,
      };
    });
  }

  function validate() {
    const errors = [];
    const leaderHeroes = readLeaderHeroes();
    const leaderTypes = leaderHeroes.map((hero) => hero.type);
    const joiners = readJoiners();
    if (num('leader-troops') <= 0) errors.push('Leader troop count must be greater than 0.');
    if (num('leader-form-infantry') + num('leader-form-lancer') + num('leader-form-marksman') !== 100) errors.push('Leader formation must equal 100%.');
    if (leaderHeroes.length !== 3) errors.push('Leader must select exactly 3 heroes.');
    troops.forEach((type) => { if (!leaderTypes.includes(type)) errors.push(`Leader needs one ${label(type)} hero.`); });
    leaderHeroes.forEach((hero) => { if (hero.stars < 1 || hero.stars > 5 || hero.widget <= 0) errors.push(`${hero.name} stars/widget are invalid.`); });
    joiners.forEach((joiner, index) => {
      if (joiner.troops <= 0) errors.push(`Joiner ${index + 1} troop count must be greater than 0.`);
      if (!joiner.captain) errors.push(`Joiner ${index + 1} needs a captain hero.`);
      if (joiner.captain && (joiner.captain.stars < 1 || joiner.captain.stars > 5 || joiner.captain.widget <= 0)) errors.push(`${joiner.name} captain stars/widget are invalid.`);
    });
    $('validation').innerHTML = errors.length ? errors.map((err) => `<div class="list-item bad">${err}</div>`).join('') : '<div class="list-item good">Rally setup is complete.</div>';
    return errors;
  }

  function formationTotals(joiners) {
    const leaderTroops = num('leader-troops');
    const totals = {
      infantry: leaderTroops * num('leader-form-infantry') / 100,
      lancer: leaderTroops * num('leader-form-lancer') / 100,
      marksman: leaderTroops * num('leader-form-marksman') / 100,
    };
    joiners.forEach((joiner) => {
      const type = joiner.captain?.type;
      if (type) totals[type] += joiner.troops;
    });
    totals.total = totals.infantry + totals.lancer + totals.marksman;
    return totals;
  }

  function skillSummary(leaderHeroes, joiners) {
    const leaderAttack = leaderHeroes.reduce((sum, hero) => sum + Number(hero.expedition?.attack_pct || 0), 0);
    const leaderDefense = leaderHeroes.reduce((sum, hero) => sum + Number(hero.expedition?.defense_pct || 0), 0);
    const captainCount = joiners.filter((joiner) => joiner.captain).length;
    return {
      leaderAttack,
      leaderDefense,
      captainCount,
      appliedNote: 'Leader expedition stats are listed from hero records. Joiner captains are counted as first-hero captain slots, but detailed captain skill modifiers remain pending verified mapping.',
    };
  }

  function render() {
    const errors = validate();
    const leaderHeroes = readLeaderHeroes();
    const joiners = readJoiners();
    const totals = formationTotals(joiners);
    const skill = skillSummary(leaderHeroes, joiners);
    const infPct = totals.total ? totals.infantry / totals.total * 100 : 0;
    const lanPct = totals.total ? totals.lancer / totals.total * 100 : 0;
    const mrkPct = totals.total ? totals.marksman / totals.total * 100 : 0;
    const balanceNotes = [
      infPct < 35 ? '<span class="warn">Infantry front line is light.</span>' : '<span class="good">Infantry coverage is acceptable.</span>',
      lanPct > 45 ? '<span class="warn">Lancer-heavy setup; confirm that is intentional.</span>' : '<span class="good">Lancer share is controlled.</span>',
      mrkPct > 45 ? '<span class="warn">Marksman-heavy setup; watch front-line durability.</span>' : '<span class="good">Marksman share is controlled.</span>',
    ];
    lastPlan = [
      `Rally Organizer - ${$('leader-name').value.trim() || 'Rally Leader'}`,
      `Rally type: ${$('rally-type').value}`,
      `Total troops: ${fmt(totals.total)}`,
      `Formation: Infantry ${infPct.toFixed(1)}%, Lancer ${lanPct.toFixed(1)}%, Marksman ${mrkPct.toFixed(1)}%`,
      `Leader heroes: ${leaderHeroes.map((h) => `${h.name} (${h.type}, ${h.stars} star, widget ${h.widget})`).join(', ')}`,
      `Joiner captains: ${joiners.map((j) => `${j.name}: ${j.captain ? j.captain.name : 'missing'} (${fmt(j.troops)} troops)`).join('; ')}`,
      `Skill note: ${skill.appliedNote}`,
    ].join('\n');
    $('output').innerHTML = `
      <div class="output-grid">
        <div class="metric"><span>Total Troops</span><strong>${fmt(totals.total)}</strong></div>
        <div class="metric"><span>Infantry</span><strong>${fmt(totals.infantry)} (${infPct.toFixed(1)}%)</strong></div>
        <div class="metric"><span>Lancer</span><strong>${fmt(totals.lancer)} (${lanPct.toFixed(1)}%)</strong></div>
        <div class="metric"><span>Marksman</span><strong>${fmt(totals.marksman)} (${mrkPct.toFixed(1)}%)</strong></div>
      </div>
      <div class="list">
        <div class="list-item"><strong>Leader Hero Expedition Totals:</strong> Attack +${skill.leaderAttack.toFixed(2)}%, Defense +${skill.leaderDefense.toFixed(2)}%</div>
        <div class="list-item"><strong>Joiner Captain Slots:</strong> ${skill.captainCount}/4 selected. ${skill.appliedNote}</div>
        <div class="list-item"><strong>Formation Summary:</strong> ${balanceNotes.join(' ')}</div>
        <div class="list-item"><strong>Rally Status:</strong> ${errors.length ? '<span class="bad">Needs fixes before sharing.</span>' : '<span class="good">Ready to share.</span>'}</div>
      </div>`;
  }

  function clear() {
    document.querySelectorAll('input').forEach((input) => {
      if (input.type === 'number') input.value = input.id.includes('troops') ? '0' : '1';
      else input.value = '';
    });
    document.querySelectorAll('select').forEach((select) => { select.selectedIndex = 0; });
    $('leader-form-infantry').value = 50;
    $('leader-form-lancer').value = 20;
    $('leader-form-marksman').value = 30;
    render();
  }

  function toast(message) {
    $('toast').textContent = message;
    $('toast').style.display = 'block';
    setTimeout(() => { $('toast').style.display = 'none'; }, 2200);
  }

  document.addEventListener('input', render);
  document.addEventListener('change', render);
  $('copy-plan').addEventListener('click', () => navigator.clipboard.writeText(lastPlan).then(() => toast('Rally setup copied.')));
  $('clear-plan').addEventListener('click', clear);
  buildLeaderHeroes();
  buildJoiners();
  render();
  </script>
</body>
</html>
